<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanFlow - Painel de Rotas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #202024;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            color: #04d361;
            margin-top: 0;
            text-align: center;
            font-size: 1.8rem;
        }
        p.subtitle {
            text-align: center;
            color: #a8a8b3;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #c4c4cc;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #323238;
            background-color: #121214;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            border-color: #04d361;
            outline: none;
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: #04d361;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #06b956;
        }
        .loading {
            text-align: center;
            color: #04d361;
            display: none;
            margin-top: 1rem;
            font-weight: bold;
        }
        #resultado {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #323238;
            display: none;
        }
        h3 {
            margin-top: 0;
            color: #04d361;
            font-size: 1.1rem;
        }
        .timeline {
            border-left: 2px solid #04d361;
            padding-left: 20px;
            margin-left: 10px;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 4px;
            background: #202024;
            border: 2px solid #04d361;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .node-name {
            font-weight: bold;
            color: #fff;
        }
        .node-coords {
            font-size: 0.8rem;
            color: #8d8d99;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>UrbanFlow 🚦⛈️</h1>
    <p class="subtitle">Cálculo de Rotas Inteligentes em Tempo Real</p>

    <div class="form-group">
        <label for="origem">ID do Cruzamento de Origem:</label>
        <input type="number" id="origem" value="1">
    </div>

    <div class="form-group">
        <label for="destino">ID do Cruzamento de Destino:</label>
        <input type="number" id="destino" value="4">
    </div>

    <button onclick="calcularRota()">Calcular Melhor Caminho</button>

    <div id="loading" class="loading">Buscando rota na nuvem... ⏳</div>

    <div id="resultado">
        <h3>🧭 Rota Otimizada Encontrada:</h3>
        <div class="timeline" id="listaCruzamentos">
        </div>
    </div>
</div>

<script>
    async function calcularRota() {
        const origemId = document.getElementById('origem').value;
        const destinoId = document.getElementById('destino').value;
        const loading = document.getElementById('loading');
        const resultadoDiv = document.getElementById('resultado');
        const lista = document.getElementById('listaCruzamentos');

        // Exibe o loading e esconde o resultado antigo
        loading.style.display = 'block';
        resultadoDiv.style.display = 'none';
        lista.innerHTML = '';

        // SUA URL DO RENDER (Mantive o "origenId" com N baseado no seu teste anterior)
        const url = `https://urbanflow-api-tbz7.onrender.com/api/rotas/otimizar?origenId=${origemId}&destinoId=${destinoId}`;

        try {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error("Erro na requisição da rota");
            }

            const caminhos = await response.json();

            if (caminhos.length === 0) {
                lista.innerHTML = '<p style="color: #f75a68;">Nenhum caminho seguro encontrado.</p>';
            } else {
                // Monta visualmente os passos do caminho encontrado
                caminhos.forEach(cruzamento => {
                    const item = document.createElement('div');
                    item.className = 'timeline-item';
                    item.innerHTML = `
                        <div class="node-name">${cruzamento.nome}</div>
                        <div class="node-coords">Lat: ${cruzamento.latitude} | Lng: ${cruzamento.longitude}</div>
                    `;
                    lista.appendChild(item);
                });
            }

            resultadoDiv.style.display = 'block';
        } catch (error) {
            alert("Erro ao conectar com a API. Verifique se o servidor do Render não está dormindo (no plano gratuito ele demora cerca de 1 minuto para acordar se ficar inativo).");
            console.error(error);
        } finally {
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
